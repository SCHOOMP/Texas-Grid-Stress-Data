name: 'grid_observatory'
version: '1.0.0'
config-version: 2

profile: 'grid_observatory'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # matches TELEMETRY_INTERVAL_SECONDS in .env - keep these in sync
  telemetry_interval_seconds: 5

models:
  grid_observatory:
    staging:
      +materialized: view
    marts:
      +materialized: table
